<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo de Libros</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="brand-mark" aria-label="Marca de la tienda Margen">
        <span class="brand-name">Margen</span>
        <span class="brand-accent" aria-hidden="true"></span>
      </div>
      <p class="brand-subtitle">biblioteca boutique</p>
      <h1>Catálogo de Libros</h1>
      <p>Explora los libros disponibles y en circulación.</p>
    </header>

    <main class="container">
      <section class="join-banner card">
        <div>
          <h2>Sumate a margen</h2>
          <p>
            Sumate y te contactamos para activar tu membresía.
          </p>
        </div>
        <a
          class="join-button"
          href="https://docs.google.com/forms/d/13cKoCXlXdi5bWG6AmFZqzb_MS7HOBawDzAXNmE69lvc/viewform?edit_requested=true"
          target="_blank"
          rel="noopener noreferrer"
        >
          Completar formulario
        </a>
      </section>

      <section class="filters card">
        <h2>Filtros</h2>
        <div class="filter-grid">
          <label>
            Buscar
            <input id="searchInput" type="text" placeholder="Título, autor o género..." />
          </label>

          <label>
            Género
            <select id="genreFilter">
              <option value="">Todos</option>
            </select>
          </label>

          <label>
            Idioma
            <select id="languageFilter">
              <option value="">Todos</option>
            </select>
          </label>

          <label>
            Estado
            <select id="statusFilter">
              <option value="">Todos</option>
              <option value="disponible">Disponible</option>
              <option value="en circulación">En circulación</option>
            </select>
          </label>
        </div>
      </section>

      <section class="catalog card">
        <div class="section-title-row">
          <h2>Libros</h2>
          <span id="resultsCount"></span>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Portada</th>
                <th>Título</th>
                <th>Autor</th>
                <th>Género</th>
                <th>Idioma</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody id="catalogTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
